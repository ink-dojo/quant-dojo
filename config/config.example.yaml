# 配置模板 — 复制为 config.yaml 并填入真实值（不要提交 config.yaml！）

# 数据源
data:
  tushare_token: "YOUR_TUSHARE_TOKEN"       # https://tushare.pro
  joinquant_user: "YOUR_JQ_USERNAME"        # 聚宽
  joinquant_pass: "YOUR_JQ_PASSWORD"
  jukuan_token: "YOUR_JUKUAN_TOKEN"         # 掘金量化

# 回测默认参数
backtest:
  initial_capital: 1_000_000               # 初始资金（元）
  commission: 0.0003                        # 手续费率（双边）
  slippage: 0.001                           # 滑点（0.1%）
  benchmark: "000300.SH"                   # 基准：沪深300

# 风控参数
risk:
  max_position_pct: 0.30                   # 单策略最大仓位比例
  max_drawdown_warning: 0.15               # 回撤预警线
  max_drawdown_stop: 0.20                  # 回撤熔断线

# 股票池
universe:
  default: "hs300"                          # 默认股票池：沪深300
  options:
    - "hs300"                              # 沪深300
    - "zz500"                              # 中证500
    - "zz1000"                             # 中证1000

# Phase 5 运行时参数（实盘/模拟盘通用配置）
phase5:
  local_data_dir: "~/quant-data"                   # 本地 CSV 行情数据目录 — 请改为你自己的路径
  signal_n_stocks: 30                    # 每次信号选股数量上限
  min_listing_days: 60                   # 最小上市天数过滤（剔除次新股）
  min_price: 2.0                         # 最低股价过滤阈值（元，剔除仙股）
  transaction_cost_rate: 0.003           # 交易成本率（双边，即单边 0.15%）
  drawdown_warning: -0.05                # 净值回撤预警线（-5%）
  drawdown_critical: -0.10               # 净值回撤临界线（-10%，需立即处理）
  concentration_limit: 0.15             # 单只股票占组合市值上限（15%）

# AI Agent 流水线配置
pipeline:
  # 当前激活策略（也可通过 live/strategy_state.json 动态切换）
  default_strategy: "v7"                 # "v7" | "v8" | "ad_hoc"

  # 流水线调度
  daemon_run_time: "16:30"               # 每日自动执行时间（BaoStock 数据约 16:00 就绪）
  data_stale_threshold_days: 3           # 数据过期阈值（超过则触发更新）

  # 因子挖掘
  factor_mining:
    min_abs_ic: 0.015                    # 因子最低 |IC| 门槛
    min_abs_icir: 0.2                    # 因子最低 |ICIR| 门槛
    min_abs_t_stat: 1.5                  # 因子最低 |t-stat| 门槛
    correlation_threshold: 0.7           # 因子间相关性上限（高于视为共线）
    top_k: 5                             # 推荐组合的因子数

  # 策略升级
  strategy_upgrade:
    threshold: 1.15                      # 新组合 ICIR 需超过当前策略的倍数（15%提升）
    auto_upgrade: true                   # 自动升级（false=仅建议）

  # 信号验证
  signal_validation:
    min_picks: 10                        # 选股数量下限
    max_picks: 60                        # 选股数量上限
    overlap_warning_threshold: 0.3       # 与前日信号重叠率预警线

# 告警通知
alerts:
  webhook_url: ""                        # 告警 webhook URL（留空则不发送）
  # 支持飞书/钉钉/Slack 等 webhook 格式
